[tools]
prek = "latest"

[tasks.lint]
description = "Lint Nix files with alejandra"
run = "nix run nixpkgs#alejandra -- --check ."

[tasks.fix]
description = "Format Nix files with alejandra"
run = "nix run nixpkgs#alejandra -- ."

[tasks.switch]
description = "Build and switch nix-darwin in one command"
usage = '''
arg "<host>" help = "Target host" {
  choices "terra"
}
'''
run = "sudo nix run nix-darwin/master#darwin-rebuild -- switch --flake .#${usage_host}"

[tasks.purge]
description = "Purge old nix builds"
run = "sudo nix-collect-garbage -d"

[tasks.prek-run]
description = "Run prek checks manually"
run = "prek run --all-files"

[tasks.prek-install]
description = "Install prek git hooks"
run = "prek install"
